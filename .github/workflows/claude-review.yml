name: Claude Code Review
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            Review this PR for roast.seedlot.io (Next.js AI roast profile wizard).

            Priority checks:
            1. **API key handling**: User Anthropic API keys must NEVER be stored or logged, session-only
            2. **Meta tags**: Pages must have <title>, <meta description>, og:title, og:description, canonical
            3. **Structured data**: Product/SoftwareApplication JSON-LD where applicable
            4. **@seedlot/roast-ui**: Shared package imports must use correct exports
            5. **Roast profile schema**: Changes to profile types must be backward compatible
            6. **ROEST format**: Any changes to ROEST export must maintain valid bezier format
            7. **Performance**: Recharts and flavor wheel components should not cause layout shifts

            For engine-improvement PRs: verify scope is micro (<10 files, <500 lines changed).
